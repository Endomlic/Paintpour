<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paint Pour Playground Clone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #0a0a0a; font-family: sans-serif; }
        canvas { display: block; touch-action: none; }
        
        /* The "Gooey" Magic: Blur + Contrast makes circles melt together */
        #canvas-container {
            filter: blur(12px) contrast(20);
            background: #0a0a0a;
            width: 100vw;
            height: 100vh;
        }

        .swatch {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: transform 0.2s;
        }
        .swatch:hover { transform: scale(1.1); }
        .swatch.active { border-color: white; transform: scale(1.2); }
    </style>
</head>
<body>

    <div class="fixed top-6 left-1/2 -translate-x-1/2 z-50 bg-black/60 backdrop-blur-md p-4 rounded-3xl border border-white/10 flex flex-col items-center gap-4 shadow-2xl">
        <h1 class="text-white text-[10px] tracking-[0.3em] uppercase opacity-50 font-bold">Paint Pour Clone</h1>
        <div id="palette" class="flex gap-3">
            </div>
        <button onclick="clearCanvas()" class="text-white/40 hover:text-white text-[10px] uppercase tracking-widest transition-colors">Reset Canvas</button>
    </div>

    <div id="canvas-container">
        <canvas id="paintCanvas"></canvas>
    </div>

    <div class="fixed bottom-6 w-full text-center pointer-events-none">
        <p class="text-white/20 text-[10px] uppercase tracking-[0.2em]">Click and hold to pour paint</p>
    </div>

    <script>
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d');
        const paletteContainer = document.getElementById('palette');
        
        const colors = ['#FF0055', '#00FFCC', '#FFCC00', '#9900FF', '#FFFFFF', '#222222'];
        let activeColor = colors[0];
        let isPouring = false;
        let particles = [];

        // Initialize Palette
        colors.forEach((color, i) => {
            const btn = document.createElement('div');
            btn.className = `swatch ${i === 0 ? 'active' : ''}`;
            btn.style.backgroundColor = color;
            btn.onclick = () => {
                document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
                btn.classList.add('active');
                activeColor = color;
            };
            paletteContainer.appendChild(btn);
        });

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        // Particle Class
        class Puddle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.size = 2;
                this.growth = Math.random() * 2 + 1;
                this.vx = (Math.random() - 0.5) * 1;
                this.vy = Math.random() * 2 + 0.5; // Gravity flow
            }

            update() {
                this.size += this.growth;
                this.x += this.vx;
                this.y += this.vy;
                this.growth *= 0.98; // Viscosity: slow down growth
                this.vy *= 0.99;     // Slow down flow
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
            }
        }

        function animate() {
            // Important: We don't clearRect fully every frame to allow paint to build up
            // But we do draw a very faint background to keep performance stable
            ctx.fillStyle = 'rgba(10, 10, 10, 0.01)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            particles.forEach((p, index) => {
                p.update();
                p.draw();
                if (p.growth < 0.1) particles.splice(index, 1);
            });

            requestAnimationFrame(animate);
        }

        function createPour(e) {
            if (!isPouring) return;
            const x = e.clientX || e.touches[0].clientX;
            const y = e.clientY || e.touches[0].clientY;
            
            // Add multiple particles for a "thick" pour
            for(let i=0; i<3; i++) {
                particles.push(new Puddle(
                    x + (Math.random() - 0.5) * 20, 
                    y + (Math.random() - 0.5) * 20, 
                    activeColor
                ));
            }
        }

        canvas.addEventListener('pointerdown', (e) => { isPouring = true; createPour(e); });
        window.addEventListener('pointerup', () => isPouring = false);
        window.addEventListener('pointermove', createPour);

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles = [];
        }

        animate();
    </script>
</body>
</html>
