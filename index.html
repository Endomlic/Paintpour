<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Paint Pour Playground</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: 'Inter', sans-serif; }
        canvas { display: block; touch-action: none; }
        
        /* The CSS Liquid Filter Stack */
        #canvas-container {
            filter: blur(14px) contrast(30) brightness(1.1);
            background: #050505;
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
        }

        .swatch {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid rgba(255,255,255,0.1);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .swatch:hover { transform: scale(1.15); border-color: rgba(255,255,255,0.5); }
        .swatch.active { border-color: white; transform: scale(1.3); box-shadow: 0 0 15px rgba(255,255,255,0.3); }

        /* Custom Scrollbar for the Palette on Mobile */
        #palette::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div class="fixed top-6 left-1/2 -translate-x-1/2 z-50 w-[90%] max-w-md">
        <div class="bg-black/60 backdrop-blur-xl p-5 rounded-[2rem] border border-white/10 flex flex-col items-center gap-5 shadow-2xl">
            <div class="flex flex-col items-center">
                <h1 class="text-white text-[10px] tracking-[0.4em] uppercase opacity-40 font-black">Fluid Lab v2.0</h1>
            </div>

            <div id="palette" class="flex gap-3 overflow-x-auto w-full justify-center py-2">
                </div>

                    Reset
                </button>
