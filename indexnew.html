<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Paint Pour Playground</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: 'Inter', sans-serif; }
        canvas { display: block; touch-action: none; }
        
        /* The CSS Liquid Filter Stack */
        #canvas-container {
            filter: blur(14px) contrast(30) brightness(1.1);
            background: #050505;
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
        }

        .swatch {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid rgba(255,255,255,0.1);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .swatch:hover { transform: scale(1.15); border-color: rgba(255,255,255,0.5); }
        .swatch.active { border-color: white; transform: scale(1.3); box-shadow: 0 0 15px rgba(255,255,255,0.3); }

        /* Custom Scrollbar for the Palette on Mobile */
        #palette::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div class="fixed top-6 left-1/2 -translate-x-1/2 z-50 w-[90%] max-w-md">
        <div class="bg-black/60 backdrop-blur-xl p-5 rounded-[2rem] border border-white/10 flex flex-col items-center gap-5 shadow-2xl">
            <div class="flex flex-col items-center">
                <h1 class="text-white text-[10px] tracking-[0.4em] uppercase opacity-40 font-black">Fluid Lab v2.0</h1>
            </div>

            <div id="palette" class="flex gap-3 overflow-x-auto w-full justify-center py-2">
                </div>

            <div class="flex gap-3 w-full">
                <button onclick="clearCanvas()" class="flex-1 bg-white/5 hover:bg-red-500/20 py-2 rounded-xl text-[10px] text-white/60 hover:text-white uppercase tracking-widest transition-all border border-white/5">
                    Reset
                </button>
                <button onclick="downloadImage()" class="flex-1 bg-white/10 hover:bg-blue-500/20 py-2 rounded-xl text-[10px] text-white uppercase tracking-widest transition-all border border-white/10 font-bold">
                    Export PNG
                </button>
            </div>
        </div>
    </div>

    <div id="canvas-container">
        <canvas id="paintCanvas"></canvas>
    </div>

    <div class="fixed bottom-8 w-full text-center pointer-events-none transition-opacity duration-1000" id="hint">
        <p class="text-white/20 text-[9px] uppercase tracking-[0.3em]">Drag to pour • Velocity affects splatter</p>
    </div>

    <script>
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d');
        const paletteContainer = document.getElementById('palette');
        
        const colors = ['#FF0055', '#00FFCC', '#FFCC00', '#9900FF', '#0077FF', '#FFFFFF', '#1A1A1A'];
        let activeColor = colors[0];
        let isPouring = false;
        let particles = [];
        let lastPos = { x: 0, y: 0 };

        // Initialize UI
        colors.forEach((color, i) => {
            const btn = document.createElement('div');
            btn.className = `swatch ${i === 0 ? 'active' : ''}`;
            btn.style.backgroundColor = color;
            btn.onclick = () => {
                document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
                btn.classList.add('active');
                activeColor = color;
            };
            paletteContainer.appendChild(btn);
        });

        // Smart Resize (Maintains Art)
        function resize() {
            const temp = ctx.getImageData(0, 0, canvas.width, canvas.height);
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            ctx.putImageData(temp, 0, 0);
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor(x, y, color, vx, vy) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.vx = vx;
                this.vy = vy;
                this.size = Math.random() * 8 + 4;
                this.growth = Math.random() * 2 + 2;
                this.viscosity = 0.95 + Math.random() * 0.03;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.size += this.growth;
                this.growth *= 0.96; // Shrink growth rate
                this.vx *= this.viscosity;
                this.vy *= this.viscosity;
                this.vy += 0.15; // Gravity constant
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
            }
        }

        function animate() {
            // Very light clear to keep performance but allow "drying"
            ctx.fillStyle = 'rgba(5, 5, 5, 0.002)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].growth < 0.01 && Math.abs(particles[i].vx) < 0.1) {
                    particles.splice(i, 1);
                }
            }
            requestAnimationFrame(animate);
        }

        function getEventPos(e) {
            const x = e.clientX || (e.touches ? e.touches[0].clientX : 0);
            const y = e.clientY || (e.touches ? e.touches[0].clientY : 0);
            return { x, y };
        }

        function handleStart(e) {
            isPouring = true;
            lastPos = getEventPos(e);
            document.getElementById('hint').style.opacity = '0';
        }

        function handleMove(e) {
            if (!isPouring) return;
            const pos = getEventPos(e);
            
            // Calculate Momentum
            const dx = pos.x - lastPos.x;
            const dy = pos.y - lastPos.y;

            // Pouring logic: More speed = more spread
            const count = Math.min(Math.hypot(dx, dy) / 2 + 1, 10);
            for(let i=0; i < count; i++) {
                particles.push(new Particle(
                    pos.x + (Math.random() - 0.5) * 15,
                    pos.y + (Math.random() - 0.5) * 15,
                    activeColor,
                    dx * 0.15,
                    dy * 0.15
                ));
            }
            lastPos = pos;
        }

        canvas.addEventListener('pointerdown', handleStart);
        window.addEventListener('pointermove', handleMove);
        window.addEventListener('pointerup', () => isPouring = false);

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles = [];
        }

        function downloadImage() {
            // Temporarily remove filter for high-res snapshot
            const container = document.getElementById('canvas-container');
            container.style.filter = 'none';
            
            const link = document.createElement('a');
            link.download = `pour-art-${Date.now()}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
            
            // Restore filter
            container.style.filter = 'blur(14px) contrast(30) brightness(1.1)';
        }

        animate();
    </script>
</body>
</html>
